name: Publish

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore: ['README.md']

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build static binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o pr-emojis-in-slack ./cmd/pr-emojis-in-slack

      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" ./pr-emojis-in-slack \
            --title "${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}" \
            --latest

      - name: Update README version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          sed -i "s|/download/v[^/]*/|/download/${{ github.ref_name }}/|g" README.md
          git add README.md
          git commit -m "docs: update README to ${{ github.ref_name }} [skip ci]"
          git push origin main

      - name: Publish latest release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes || true
          gh release create latest ./pr-emojis-in-slack \
            --title "Latest" \
            --notes "Auto-published from main" \
            --prerelease

name: PR Emojis in Slack

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [closed]

permissions:
  pull-requests: read
  packages: read

jobs:
  pr-emojis:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run pr-emojis-in-slack
        run: |
          docker run --rm \
            -e GITHUB_TOKEN \
            -e GITHUB_EVENT_PATH \
            -e GITHUB_REPOSITORY \
            -e SLACK_CHANNEL_ID \
            -e SLACK_BOT_TOKEN \
            -e SLACK_BOT_USER_ID \
            -v "$GITHUB_EVENT_PATH:$GITHUB_EVENT_PATH:ro" \
            ghcr.io/adeptmind/pr-emojis-in-slack:latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_BOT_USER_ID: ${{ vars.SLACK_BOT_USER_ID }}

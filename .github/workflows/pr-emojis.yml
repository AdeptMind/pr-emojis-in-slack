name: PR Emojis in Slack

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, synchronize, closed]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-emojis:
    runs-on: ubuntu-latest
    steps:
      - name: Run pr-emojis-in-slack
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_BOT_USER_ID: ${{ vars.SLACK_BOT_USER_ID }}
        run: |
          curl -sL -H "Authorization: token $GH_TOKEN" -H "Accept: application/octet-stream" \
            "$(curl -sL -H "Authorization: token $GH_TOKEN" \
              https://api.github.com/repos/AdeptMind/pr-emojis-in-slack/releases/tags/latest \
              | jq -r '.assets[] | select(.name=="pr-emojis-in-slack") | .url')" \
            -o pr-emojis-in-slack
          chmod +x pr-emojis-in-slack
          ./pr-emojis-in-slack
